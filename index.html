<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Exercicio</title>
    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>
<body>
    <div class="all">
        <h1>Verificador de Idade</h1>
        <main>
            <section class="content">
                <article>
                    <label for="year">Ano de Nascimento:</label>
                    <input type="number" name="year" id="year">
                </article>

                <fieldset>
                    <legend>Sexo:</legend>
                    <article>
                        <input type="radio" name="sex" id="masc" checked>
                        <label for="masc">Masculino</label>
                    </article>
                    <article>
                        <input type="radio" name="sex" id="fem">
                        <label for="fem">Feminino</label>
                    </article>
                </fieldset>

                <button id="btnVerificar">Verificar</button>
                <p class="txt">Preencha os dados acima para ver o resultado!</p>
                <div id="res"></div>
            </section>
        </main>
        <footer>
            <p>&copy; Curso em Video</p>
        </footer>
    </div>
</body>
</html>
